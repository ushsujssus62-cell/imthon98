<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#2A2A2A]">

    <div>
        <img src="./images/Heading 1.png" alt="">
    </div>

    <form id="form" action="" class="w-[700px] bg-[#fff] p-[20px] mx-auto rounded flex justify-between">
        <input id="input" class="outline-none" type="text" placeholder="Enter movies">
        <select class="bg-red-300" name="" id="select">
            <option value="A-Z">A-Z</option>
            <option value="Z-A">Z-A</option>
        </select>
        <button class="bg-red-500 rounded-lg p-[8px]" type="submit">Search</button>
    </form>

    <ul id="moviesWrapper" class="flex flex-wrap gap-[20px] justify-between mt-[50px]">

    </ul>


    
    
    <script src="./main.js" type="module"></script>
</body>
</html>
